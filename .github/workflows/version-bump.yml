name: Version Bump

on:
  pull_request:
    branches: [main]
    types: [opened, labeled]

jobs:
  version-bump:
    uses: praetorian-inc/public-workflows/.github/workflows/version-bump.yml@7c1302bdef0a72e7f5743738baa45272c8e1f8d7  # v2.1.0
    permissions:
      contents: write
      pull-requests: write
    secrets:
      VERSION_BUMPER_APP_ID: ${{ secrets.VERSION_BUMPER_APP_ID }}
      VERSION_BUMPER_PRIVATE_KEY: ${{ secrets.VERSION_BUMPER_PRIVATE_KEY }}
